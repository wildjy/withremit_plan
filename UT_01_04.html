<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>withremit - 친구 초대</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/guide.css">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel='stylesheet' href='css/auth.css'>
    <!-- <link rel='stylesheet' href='css/account.css'> -->
    <script src='js/auth.js'></script>
</head>

<body class="db-body">
    <div id="headerContainer"></div>

    <main class="db-main-container container">
        <div class="db-layout-flex">
            <div id="sidebarContainer"></div>

            <div id="Container"></div>

            <div class="db-content">
                <div class="db-page-header">
                    <h1 class="db-page-title">친구 초대</h1>
                    <div class="db-page-actions">
                        <button type="button" class="btn btn-primary" onclick="addFriendRow()">친구 추가</button>
                    </div>
                </div>

                <div class="db-content-card">
                    <!-- Premium Hero Section -->
                    <div class="guide-hero">
                        <h2 class="hero-title">친구 초대 및 무료 쿠폰 발송</h2>
                        <p class="hero-desc">
                          친구의 휴대전화 번호만 입력하면 즉시 초대장이 발송됩니다.
                        </p>
                    </div>

                    <!-- Total Count -->
                    <div class="db-table-info">
                        <span class="db-total-count">총 <strong id="totalCount">0</strong>건</span>
                    </div>

                    <!-- Table Container -->
                    <div class="db-table-responsive">
                        <table class="db-notice-table history-mode coupon-mode">
                            <colgroup>
                                <col class="col-num">
                                <col>
                                <col class="col-delete">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th class="th-num">번호</th>
                                    <th>친구 전화번호</th>
                                    <th>삭제</th>
                                </tr>
                            </thead>
                            <tbody id="deleteTableBody">
                                <tr>
                                    <td class="td-num" data-label="번호">2</td>
                                    <td data-label="친구 전화번호">
                                      <div class="field-item">
                                          <label class="field-label">친구 전화번호</label>
                                          <input type="text" placeholder="전화번호를 입력하세요" class="login-input" id="friendPhone2" />
                                      </div>
                                    </td>
                                    <td data-label="삭제">
                                        <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="td-num" data-label="번호">1</td>
                                    <td data-label="친구 전화번호">
                                      <div class="field-item">
                                          <label class="field-label">친구 전화번호</label>
                                          <input type="text" placeholder="전화번호를 입력하세요" class="login-input" id="friendPhone1" />
                                      </div>
                                    </td>
                                    <td data-label="삭제">
                                        <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <p class="field-info">초대한 친구가 해당 번호로 가입 후 첫 송금을 완료하면 회원님께도 송금 수수료 무료 쿠폰이 발행됩니다.</p>
                    </div>
                </div>

                <div class="btn-align">
                    <button type="button" class="btn btn-secondary size-lg" onclick="location.reload()">취소</button>
                    <button type="button" class="btn btn-primary size-lg" onclick="saveFriends()">초대장 발송</button>
                </div>
            </div>
        </div>
        </div>
    </main>

    <div id="contactContainer"></div>
    <div id="footerContainer"></div>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="#00A0DC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11"></polyline>
                    </svg>
                </div>
                <h3>계좌 등록 완료</h3>
                <p>계좌가 성공적으로 등록되었습니다.</p>
                <button class="btn btn-primary full size-lg" onclick="closeSuccessModal()">확인</button>

            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="deleteConfirmModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="#1B5E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <h3>계좌 삭제</h3>
                <p>정말 삭제하시겠습니까?</p>
                <div class="modal-btn-group">
                    <button class="btn btn-secondary size-lg" onclick="closeModal('deleteConfirmModal')">취소</button>
                    <button class="btn btn-confirm size-lg" onclick="confirmDelete()">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Validation Modal -->
    <div id="validationModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
                <h3>삭제 오류</h3>
                <p>친구는 최소 1인 입력해 주세요.</p>
                <button class="btn btn-warning full size-lg" onclick="closeValidationModal()" data-i18n="button.confirm">확인</button>
            </div>
        </div>
    </div>

    <!-- Invite Already Member Modal -->
    <div id="inviteAlreadyMemberModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
                <h3>안내</h3>
                <p data-i18n="modal.invite.alreadyMember">이미가입한 회원입니다</p>
                <button class="btn btn-warning full size-lg" onclick="closeModal('inviteAlreadyMemberModal')" data-i18n="button.confirm">확인</button>
            </div>
        </div>
    </div>

    <!-- Invite Confirm Modal -->
    <div id="inviteConfirmModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="#1B5E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <h3>안내</h3>
                <p data-i18n="modal.invite.confirmSend">입력하신 정보로 초대장을 발송하시겠습니까?</p>
                <div class="modal-btn-group">
                    <button class="btn btn-secondary size-lg" onclick="closeModal('inviteConfirmModal')" data-i18n="button.cancel">취소</button>
                    <button class="btn btn-confirm size-lg" onclick="confirmInviteSend()" data-i18n="button.confirm">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Invite Success Modal -->
    <div id="inviteSuccessModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="#00A0DC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11"></polyline>
                    </svg>
                </div>
                <h3 data-i18n="modal.notice.title">안내</h3>
                <p data-i18n="modal.invite.sendSuccess">초대장 발송이 완료되었습니다</p>
                <button class="btn btn-primary full size-lg" onclick="closeModal('inviteSuccessModal')" data-i18n="button.confirm">확인</button>
            </div>
        </div>
    </div>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>
    <script>
        const REGISTERED_MEMBER_PHONES = new Set(['01012345678', '01099998888', '01077776666']);
        let inviteDeleteButton = null;

        function updateRowNumbers() {
            const tbody = document.getElementById('deleteTableBody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            const total = rows.length;

            rows.forEach((row, index) => {
                const numberCell = row.querySelector('.td-num');
                if (numberCell) {
                    numberCell.textContent = String(total - index);
                }

                const phoneInput = row.querySelector('input.login-input');
                if (phoneInput) {
                    phoneInput.id = `friendPhone${total - index}`;
                }
            });
        }

        function updateTotalCount() {
            const tbody = document.getElementById('deleteTableBody');
            const totalCountElement = document.getElementById('totalCount');

            if (!tbody || !totalCountElement) {
                return;
            }

            totalCountElement.textContent = String(tbody.querySelectorAll('tr').length);
        }

        function addFriendRow() {
            const tbody = document.getElementById('deleteTableBody');
            if (!tbody) {
                return;
            }

            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="td-num" data-label="번호"></td>
                <td>
                    <div class="field-item">
                        <label class="field-label">전화번호</label>
                        <input type="text" placeholder="전화번호를 입력하세요" class="login-input" id="friendPhoneNew"/>
                    </div>
                </td>
                <td data-label="삭제">
                    <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                </td>
            `;

            tbody.insertBefore(newRow, tbody.firstChild);
            updateRowNumbers();
            updateTotalCount();
        }

        function removeRow(button) {
            inviteDeleteButton = button;
            openModal('deleteConfirmModal');
        }

        function confirmDelete() {
            const tbody = document.getElementById('deleteTableBody');
            if (!tbody || !inviteDeleteButton) {
                closeModal('deleteConfirmModal');
                inviteDeleteButton = null;
                return;
            }

            const rows = tbody.querySelectorAll('tr');
            if (rows.length <= 1) {
                closeModal('deleteConfirmModal');
                openModal('validationModal');
                inviteDeleteButton = null;
                return;
            }

            inviteDeleteButton.closest('tr')?.remove();
            inviteDeleteButton = null;
            closeModal('deleteConfirmModal');
            updateRowNumbers();
            updateTotalCount();
        }

        function closeValidationModal() {
            const modal = document.getElementById('validationModal');
            if (modal) {
                closeModal('validationModal');
            }
        }

        function confirmInviteSend() {
            closeModal('inviteConfirmModal');
            openModal('inviteSuccessModal');
        }

        function saveFriends() {
            const tbody = document.getElementById('deleteTableBody');
            if (!tbody) {
                return;
            }

            const rows = Array.from(tbody.querySelectorAll('tr'));
            if (rows.length < 1) {
                openModal('validationModal');
                return;
            }

            const phoneInputs = rows
                .map(row => row.querySelector('input.login-input'))
                .filter(Boolean);

            for (const input of phoneInputs) {
                input.value = input.value.replace(/[^0-9]/g, '').trim();

                if (!input.value) {
                    openModal('validationModal');
                    input.focus();
                    return;
                }

                if (REGISTERED_MEMBER_PHONES.has(input.value)) {
                    openModal('inviteAlreadyMemberModal');
                    input.focus();
                    return;
                }
            }

            openModal('inviteConfirmModal');
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateRowNumbers();
            updateTotalCount();
        });

        function registerAccount() {
            const bank = document.getElementById('bankSelect').value;
            const accountNum = document.getElementById('accountNumber').value;
            const holder = document.getElementById('accountHolder').value;

            if (!bank || !accountNum || !holder) {
                document.getElementById('validationModal').classList.add('active');
                return;
            }

            // Mask account number (show first 4 digits only)
            const maskedAccount = accountNum.substring(0, 4) + '*'.repeat(Math.max(7, accountNum.length - 4));

            // Add new row to table
            const tbody = document.getElementById('deleteTableBody');
            const rowCount = tbody.querySelectorAll('tr').length;
            const newRow = document.createElement('tr');

            newRow.innerHTML = `
                <td class="td-num" data-label="번호">${rowCount + 1}</td>
                <td data-label="은행명">${bank}</td>
                <td data-label="계좌 번호">${maskedAccount}</td>
                <td data-label="예금주">${holder}</td>
                <td data-label="1원 인증상태">
                    <span class="status-unverified">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                        </svg>
                        미인증
                    </span>
                </td>
                <td data-label="본인 인증 상태">
                    <span class="status-unverified">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                        </svg>
                        미인증
                    </span>
                </td>
                <td data-label="삭제">
                    <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                </td>
            `;


            tbody.insertBefore(newRow, tbody.firstChild);
            closeModal('accountModal')
            updateTotalCount();
        }

    </script>
</body>

</html>
