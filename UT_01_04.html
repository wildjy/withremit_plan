<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>withremit - 친구 초대</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/guide.css">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel='stylesheet' href='css/auth.css'>
    <!-- <link rel='stylesheet' href='css/account.css'> -->
    <script src='js/auth.js'></script>
</head>

<body class="db-body">
    <div id="headerContainer"></div>

    <main class="db-main-container container">
        <div class="db-layout-flex">
            <div id="sidebarContainer"></div>

            <div id="Container"></div>

            <div class="db-content">
                <div class="db-page-header">
                    <h1 class="db-page-title">친구 초대</h1>
                    <div class="db-page-actions">
                        <button type="button" class="btn btn-primary" onclick="addFriendRow()">친구 추가</button>
                    </div>
                </div>

                <div class="db-content-card">
                    <!-- Premium Hero Section -->
                    <div class="guide-hero">
                        <h2 class="hero-title">친구 초대 및 무료 쿠폰 발송</h2>
                        <p class="hero-desc">
                          친구의 휴대전화 번호만 입력하면 즉시 초대장이 발송됩니다.
                        </p>
                    </div>

                    <!-- Total Count -->
                    <p class="coupon-total-count">
                        <span>총</span> <b id="couponTotalCount"></b><span>건</span>
                    </p>

                    <!-- Table Container -->
                    <div class="db-table-responsive">
                        <table class="common-table history-mode coupon-mode">
                            <colgroup>
                                <col class="col-num">
                                <col>
                                <col class="col-delete">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th class="th-num">번호</th>
                                    <th>친구 전화번호</th>
                                    <th>삭제</th>
                                </tr>
                            </thead>
                            <tbody id="deleteTableBody">
                                <tr>
                                    <td class="td-num" data-label="번호">2</td>
                                    <td data-label="친구 전화번호">
                                      <div class="field-item">
                                          <label class="field-label">친구 전화번호</label>
                                          <input type="text" placeholder="전화번호를 입력하세요" class="login-input" id="friendPhone2" />
                                      </div>
                                    </td>
                                    <td data-label="삭제">
                                        <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="td-num" data-label="번호">1</td>
                                    <td data-label="친구 전화번호">
                                      <div class="field-item">
                                          <label class="field-label">친구 전화번호</label>
                                          <input type="text" placeholder="전화번호를 입력하세요" class="login-input" id="friendPhone1" />
                                      </div>
                                    </td>
                                    <td data-label="삭제">
                                        <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <p class="field-info">초대한 친구가 해당 번호로 가입 후 첫 송금을 완료하면 회원님께도 송금 수수료 무료 쿠폰이 발행됩니다.</p>
                    </div>
                </div>

                <div class="btn-align">
                    <button type="button" class="btn btn-secondary size-lg" onclick="location.reload()">취소</button>
                    <button type="button" class="btn btn-primary size-lg" onclick="saveFriends()">초대장 발송</button>
                </div>
            </div>
        </div>
        </div>
    </main>

    <div id="contactContainer"></div>
    <div id="footerContainer"></div>

    <!-- 삭제 확인 Modal -->
    <div id="deleteConfirmModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="/images/svg/icon_confirm.svg" alt="업로드 아이콘" class="upload-icon" />
                </div>
                <h3>계좌 삭제</h3>
                <p>정말 삭제하시겠습니까?</p>
                <div class="modal-btn-group">
                    <button class="btn btn-secondary size-lg" onclick="closeModal('deleteConfirmModal')">취소</button>
                    <button class="btn btn-confirm size-lg" onclick="confirmDelete()">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 삭제 오류 Modal -->
    <div id="validationModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                      </path>
                      <line x1="12" y1="9" x2="12" y2="13"></line>
                      <line x1="12" y1="17" x2="12.01" y2="17"></line>
                  </svg>
                </div>
                <h3>삭제 오류</h3>
                <p>친구는 최소 1인 입력해 주세요.</p>
                <button class="btn btn-warning full size-lg" onclick="closeValidationModal()" data-i18n="button.confirm">확인</button>
            </div>
        </div>
    </div>

    <!-- 이미 가입한 회원 Modal -->
    <div id="inviteAlreadyMemberModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                      </path>
                      <line x1="12" y1="9" x2="12" y2="13"></line>
                      <line x1="12" y1="17" x2="12.01" y2="17"></line>
                  </svg>
                </div>
                <h3>안내</h3>
                <p data-i18n="modal.invite.alreadyMember">이미가입한 회원입니다</p>
                <button class="btn btn-warning full size-lg" onclick="closeModal('inviteAlreadyMemberModal')" data-i18n="button.confirm">확인</button>
            </div>
        </div>
    </div>

    <!-- 초대장 발송 Modal -->
    <div id="inviteConfirmModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="/images/svg/icon_confirm.svg" alt="확인 아이콘" class="upload-icon" />
                </div>
                <h3>안내</h3>
                <p data-i18n="modal.invite.confirmSend">입력하신 정보로 초대장을 발송하시겠습니까?</p>
                <div class="modal-btn-group">
                    <button class="btn btn-secondary size-lg" onclick="closeModal('inviteConfirmModal')" data-i18n="button.cancel">취소</button>
                    <button class="btn btn-confirm size-lg" onclick="confirmInviteSend()" data-i18n="button.confirm">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 초대장 발송 완료 Modal -->
    <div id="inviteSuccessModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="/images/svg/icon_success.svg" alt="성공 아이콘" class="upload-icon" />
                </div>
                
                <h3 data-i18n="modal.notice.title">안내</h3>
                <p data-i18n="modal.invite.sendSuccess">초대장 발송이 완료되었습니다</p>
                <button class="btn btn-primary full size-lg" onclick="closeModal('inviteSuccessModal')" data-i18n="button.confirm">확인</button>
            </div>
        </div>
    </div>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.initFriendInvite === 'function') {
                window.initFriendInvite();
            }
        });
    </script>
</body>

</html>
