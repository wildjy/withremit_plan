<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="withremit 로그인 - 해외송금 서비스">
    <title>로그인 - WithMoney</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel='stylesheet' href='css/auth.css'>
    <script src='js/auth.js'></script>

</head>

<body class="login-page">

    <!-- Login Container -->
    <main class="login-container">
        <div class="login-logo">
            <a href="CM_02_01.html"><img src="images/logo-withremit.png" alt="withremit"></a>
        </div>

        <div class="login-card">
            <h2 class="login-title">로그인</h2>
            <form class="login-form" action="#" method="post">
                <div class="field-group">
                    <label class="field-label" for="userId">아이디</label>
                    <div class="input-box-group" id="userIdBox">
                        <input type="text" id="userId" name="userId" class="login-input" placeholder="아이디를 입력하세요">
                    </div>
                    <div class="error-msg" id="userIdError"></div>
                </div>

                <div class="field-group">
                    <label class="field-label" for="userPassword">비밀번호</label>
                    <div class="input-box-group" id="userPasswordBox">
                        <div class="password-wrap">
                            <input type="password" id="userPassword" name="userPassword" class="login-input"
                                placeholder="비밀번호를 입력하세요" readonly onclick="toggleKeypad('userPassword')">
                            <button type="button" class="keypad-btn" tabindex="-1">
                                <img src="images/svg/icon_keypad.svg" alt="보안 키보드 아이콘" />
                            </button>
                            <div id="securityKeypad" class="security-keypad">
                                <div class="keypad-header">
                                    <span>보안 키보드</span>
                                    <button type="button" class="close-keypad" onclick="toggleKeypad()">&times;</button>
                                </div>
                                <div id="keypadContainer" class="keypad-grid"></div>
                            </div>
                        </div>
                    </div>
                    <div class="error-msg" id="userPasswordError"></div>
                </div>

                <div class="login-options">
                    <label class="keep-login-wrap">
                        <input type="checkbox" name="autoLogin">
                        <span class="custom-check"></span>
                        <span class="opt-label">로그인 상태 유지</span>
                    </label>
                    <div class="find-links">
                        <a href="CM_03_02.html">아이디/비밀번호찾기</a>
                    </div>
                </div>
                <div class="btn-align wrap">
                    <button type="button" class="btn btn-primary full size-lg" onclick="handleLoginRedirect()">로그인</button>
                    <a href="CM_02_01.html" class="btn btn-secondary full size-lg">취소</a>
                </div>
            </form>
            <div class="register-wrap">
                <a href="CM_04_01.html" class="register-item">첫 송금인가요? 지금 회원가입하세요.</a>

                <div class="sns-separator"></div>

                <div class="sns-login-buttons">
                    <!-- Line -->
                    <button type="button" class="btn-sns btn-line">
                        <div class="sns-icon-wrap">
                            <img src="images/icon-line.png" alt="LINE" class="sns-icon-img">
                        </div>
                        LINE으로 로그인
                    </button>

                    <!-- Kakao -->
                    <button type="button" class="btn-sns btn-kakao">
                        <div class="sns-icon-wrap">
                            <img src="images/icon-kakao.png" alt="Kakao" class="sns-icon-img">
                        </div>
                        카카오로 로그인
                    </button>

                    <!-- Facebook -->
                    <button type="button" class="btn-sns btn-facebook">
                        <div class="sns-icon-wrap">
                            <img src="images/icon-facebook.png" alt="Facebook" class="sns-icon-img">
                        </div>
                        페이스북으로 로그인
                    </button>

                    <!-- Viber -->
                    <button type="button" class="btn-sns btn-viber">
                        <div class="sns-icon-wrap">
                            <img src="images/icon-viber.png" alt="Viber" class="sns-icon-img">
                        </div>
                        Viber로 로그인
                    </button>
                </div>
            </div>
        </div>

        <div class="login-footer-wrap" id="loginFooterContainer"></div>
    </main>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="js/includes.js"></script>
    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
    <script>
        function handleLoginRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const redirectTarget = urlParams.get('redirect');

            if (redirectTarget) {
                location.href = redirectTarget;
            } else {
                location.href = 'DB_01_01.html';
            }
        }
    </script>
</body>

</html>
