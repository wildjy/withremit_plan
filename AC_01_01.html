<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>withremit - 개인 계좌</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel='stylesheet' href='css/auth.css'>

</head>

<body class="db-body">
    <div id="headerContainer"></div>

    <main class="db-main-container container">
        <div class="db-layout-flex">
            <div id="sidebarContainer"></div>

            <div id="Container"></div>

            <div class="db-content">
                <div class="db-page-header">
                    <h1 class="db-page-title">개인 계좌</h1>
                    <div class="db-page-actions">
                        <button type="button" class="btn btn-primary" onclick="openModal('accountModal')">등록</button>
                    </div>
                </div>

                <div class="db-content-card">

                    <!-- Table Container -->

                                                <path d="M6.66667 0C2.99333 0 0 2.99333 0 6.66667C0 10.34 2.99333 13.3333 6.66667 13.3333C10.34 13.3333 13.3333 10.34 13.3333 6.66667C13.3333 2.99333 10.34 0 6.66667 0ZM9.85333 5.13333L6.07333 8.91333C5.98 9.00667 5.85333 9.06 5.72 9.06C5.58667 9.06 5.46 9.00667 5.36667 8.91333L3.48 7.02667C3.28667 6.83333 3.28667 6.51333 3.48 6.32C3.67333 6.12667 3.99333 6.12667 4.18667 6.32L5.72 7.85333L9.14667 4.42667C9.34 4.23333 9.66 4.23333 9.85333 4.42667C10.0467 4.62 10.0467 4.93333 9.85333 5.13333Z" fill="#059669"></path>

                                        </span>
                                    </td>
                                    <td data-label="삭제">
                                        <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="td-num" data-label="번호">2</td>
                                    <td data-label="은행명">우리은행</td>
                                    <td data-label="계좌 번호">5678*******</td>
                                    <td data-label="예금주">이지수</td>
                                    <td data-label="1원 인증상태">
                                    <span class="remit-status status-unverified">

                                        </svg>
                                        미인증
                                    </span>
                                    </td>
                                    <td data-label="본인 인증 상태">
                                        <span class="remit-status status-verified">
                                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6.66667 0C2.99333 0 0 2.99333 0 6.66667C0 10.34 2.99333 13.3333 6.66667 13.3333C10.34 13.3333 13.3333 10.34 13.3333 6.66667C13.3333 2.99333 10.34 0 6.66667 0ZM9.85333 5.13333L6.07333 8.91333C5.98 9.00667 5.85333 9.06 5.72 9.06C5.58667 9.06 5.46 9.00667 5.36667 8.91333L3.48 7.02667C3.28667 6.83333 3.28667 6.51333 3.48 6.32C3.67333 6.12667 3.99333 6.12667 4.18667 6.32L5.72 7.85333L9.14667 4.42667C9.34 4.23333 9.66 4.23333 9.85333 4.42667C10.0467 4.62 10.0467 4.93333 9.85333 5.13333Z" fill="#059669"></path>
                                            </svg>
                                            인증
                                        </span>
                                    </td>
                                    <td data-label="삭제">
                                        <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="td-num" data-label="번호">1</td>
                                    <td data-label="은행명">KB국민은행</td>
                                    <td data-label="계좌 번호">9012*******</td>
                                    <td data-label="예금주">박지원</td>
                                    <td data-label="1원 인증상태">
                                        <span class="remit-status status-verified">
                                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6.66667 0C2.99333 0 0 2.99333 0 6.66667C0 10.34 2.99333 13.3333 6.66667 13.3333C10.34 13.3333 13.3333 10.34 13.3333 6.66667C13.3333 2.99333 10.34 0 6.66667 0ZM9.85333 5.13333L6.07333 8.91333C5.98 9.00667 5.85333 9.06 5.72 9.06C5.58667 9.06 5.46 9.00667 5.36667 8.91333L3.48 7.02667C3.28667 6.83333 3.28667 6.51333 3.48 6.32C3.67333 6.12667 3.99333 6.12667 4.18667 6.32L5.72 7.85333L9.14667 4.42667C9.34 4.23333 9.66 4.23333 9.85333 4.42667C10.0467 4.62 10.0467 4.93333 9.85333 5.13333Z" fill="#059669"></path>
                                            </svg>
                                            인증
                                        </span>
                                    </td>
                                    <td data-label="본인 인증 상태">
                                        <span class="remit-status status-unverified">
                                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6.66667 0C2.99333 0 0 2.99333 0 6.66667C0 10.34 2.99333 13.3333 6.66667 13.3333C10.34 13.3333 13.3333 10.34 13.3333 6.66667C13.3333 2.99333 10.34 0 6.66667 0ZM8.90667 8.2C9.1 8.39333 9.1 8.71333 8.90667 8.90667C8.80667 9.00667 8.68 9.05333 8.55333 9.05333C8.42667 9.05333 8.3 9.00667 8.2 8.90667L6.66667 7.37333L5.13333 8.90667C5.03333 9.00667 4.90667 9.05333 4.78 9.05333C4.65333 9.05333 4.52667 9.00667 4.42667 8.90667C4.23333 8.71333 4.23333 8.39333 4.42667 8.2L5.96 6.66667L4.42667 5.13333C4.23333 4.94 4.23333 4.62 4.42667 4.42667C4.62 4.23333 4.94 4.23333 5.13333 4.42667L6.66667 5.96L8.2 4.42667C8.39333 4.23333 8.71333 4.23333 8.90667 4.42667C9.1 4.62 9.1 4.94 8.90667 5.13333L7.37333 6.66667L8.90667 8.2Z" fill="#EF4444"></path>
                                            </svg>

                                        </span>

                                    <td data-label="삭제">
                                        <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </main>

    <div id="contactContainer"></div>
    <div id="footerContainer"></div>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="images/svg/icon_success.svg" alt="성공 아이콘" class="upload-icon" />
                </div>
                <h3>계좌 등록 완료</h3>
                <p>계좌가 성공적으로 등록되었습니다.</p>
                <button class="btn btn-primary full size-lg" onclick="closeSuccessModal()">확인</button>

            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="deleteConfirmModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="images/svg/icon_confirm.svg" alt="업로드 아이콘" class="upload-icon" />
                </div>
                <h3>계좌 삭제</h3>
                <p>정말 삭제하시겠습니까?</p>
                <div class="modal-btn-group">
                    <button class="btn btn-secondary size-lg" onclick="closeModal('deleteConfirmModal')">취소</button>
                    <button class="btn btn-confirm size-lg" onclick="confirmDelete()">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bank Account Registration Modal -->
    <div class="modal-overlay disabled-outClose" id="accountModal">
        <div class="modal-content modal-layout">
            <div class="modal-inner">
                <div class="modal-header">
                    <h2 class="modal-title">은행 계좌 등록</h2>
                    <button class="btn-close-modal" onclick="closeModal('accountModal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="modal-body-form">
                        <div class="field-item" style="margin-bottom: var(--s5);">
                            <label class="field-label">은행</label>
                            <select class="login-input select-styled" id="bankSelect">
                                <option value="">은행 선택</option>
                                <option value="신한은행">신한은행</option>
                                <option value="우리은행">우리은행</option>
                                <option value="KB국민은행">KB국민은행</option>
                                <option value="하나은행">하나은행</option>
                                <option value="IBK기업은행">IBK기업은행</option>
                                <option value="NH농협은행">NH농협은행</option>
                                <option value="카카오뱅크">카카오뱅크</option>
                                <option value="토스뱅크">토스뱅크</option>
                                <option value="SC제일은행">SC제일은행</option>
                                <option value="케이뱅크">케이뱅크</option>
                            </select>
                        </div>
                        <div class="field-item">
                            <label class="field-label">계좌 번호</label>
                            <input
                                type="text"
                                class="login-input "
                                id="accountNumber"
                                inputmode="numeric"
                                pattern="[0-9]*"
                                oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                                placeholder="계좌 번호 입력 (- 없이)"
                            />
                        </div>
                        <div class="field-item">
                            <label class="field-label">예금주</label>
                            <input type="text" class="login-input" id="accountHolder" placeholder="예금주 입력" />
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary size-lg" onclick="closeModal('accountModal')">취소</button>
                    <button type="button" class="btn btn-primary size-lg" onclick="registerAccount()">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Validation Modal -->
    <div id="validationModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="images/svg/icon_warning.svg" alt="경고 아이콘" class="upload-icon">
                </div>
                <h3>입력 오류</h3>
                <p>모든 항목을 입력해주세요.</p>
                <button class="btn btn-warning full size-lg" onclick="closeValidationModal()">확인</button>
            </div>
        </div>
    </div>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>
    <script>
        function closeAccountModal() {
            closeModal('accountModal')
            // Reset form
            document.getElementById('bankSelect').value = '';
            document.getElementById('accountNumber').value = '';
            document.getElementById('accountHolder').value = '';
        }

        function registerAccount() {
            const bank = document.getElementById('bankSelect').value;
            const accountNum = document.getElementById('accountNumber').value;
            const holder = document.getElementById('accountHolder').value;

            if (!bank || !accountNum || !holder) {
                openModal('validationModal');
                return;
            }

            // Mask account number (show first 4 digits only)
            const maskedAccount = accountNum.substring(0, 4) + '*'.repeat(Math.max(7, accountNum.length - 4));

            // Add new row to table
            const tbody = document.getElementById('deleteTableBody');
            const rowCount = tbody.querySelectorAll('tr').length;
            const newRow = document.createElement('tr');

            newRow.innerHTML = `
                <td class="td-num" data-label="번호">${rowCount + 1}</td>
                <td data-label="은행명">${bank}</td>
                <td data-label="계좌 번호">${maskedAccount}</td>
                <td data-label="예금주">${holder}</td>
                <td data-label="1원 인증상태">
                    <span class="remit-status status-unverified">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6.66667 0C2.99333 0 0 2.99333 0 6.66667C0 10.34 2.99333 13.3333 6.66667 13.3333C10.34 13.3333 13.3333 10.34 13.3333 6.66667C13.3333 2.99333 10.34 0 6.66667 0ZM8.90667 8.2C9.1 8.39333 9.1 8.71333 8.90667 8.90667C8.80667 9.00667 8.68 9.05333 8.55333 9.05333C8.42667 9.05333 8.3 9.00667 8.2 8.90667L6.66667 7.37333L5.13333 8.90667C5.03333 9.00667 4.90667 9.05333 4.78 9.05333C4.65333 9.05333 4.52667 9.00667 4.42667 8.90667C4.23333 8.71333 4.23333 8.39333 4.42667 8.2L5.96 6.66667L4.42667 5.13333C4.23333 4.94 4.23333 4.62 4.42667 4.42667C4.62 4.23333 4.94 4.23333 5.13333 4.42667L6.66667 5.96L8.2 4.42667C8.39333 4.23333 8.71333 4.23333 8.90667 4.42667C9.1 4.62 9.1 4.94 8.90667 5.13333L7.37333 6.66667L8.90667 8.2Z" fill="#EF4444"></path>
                        </svg>
                        미인증
                    </span>
                </td>
                <td data-label="본인 인증 상태">
                    <span class="remit-status status-unverified">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6.66667 0C2.99333 0 0 2.99333 0 6.66667C0 10.34 2.99333 13.3333 6.66667 13.3333C10.34 13.3333 13.3333 10.34 13.3333 6.66667C13.3333 2.99333 10.34 0 6.66667 0ZM8.90667 8.2C9.1 8.39333 9.1 8.71333 8.90667 8.90667C8.80667 9.00667 8.68 9.05333 8.55333 9.05333C8.42667 9.05333 8.3 9.00667 8.2 8.90667L6.66667 7.37333L5.13333 8.90667C5.03333 9.00667 4.90667 9.05333 4.78 9.05333C4.65333 9.05333 4.52667 9.00667 4.42667 8.90667C4.23333 8.71333 4.23333 8.39333 4.42667 8.2L5.96 6.66667L4.42667 5.13333C4.23333 4.94 4.23333 4.62 4.42667 4.42667C4.62 4.23333 4.94 4.23333 5.13333 4.42667L6.66667 5.96L8.2 4.42667C8.39333 4.23333 8.71333 4.23333 8.90667 4.42667C9.1 4.62 9.1 4.94 8.90667 5.13333L7.37333 6.66667L8.90667 8.2Z" fill="#EF4444"></path>
                        </svg>
                        미인증
                    </span>
                </td>
                <td data-label="삭제">
                    <button type="button" class="btn btn-delete full size-sm" onclick="removeRow(this)">삭제</button>
                </td>
            `;


            tbody.insertBefore(newRow, tbody.firstChild);
            closeModal('accountModal')
            updateTotalCount();
        }

    </script>
</body>

</html>
