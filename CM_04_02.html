<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>회원가입 - withremit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel='stylesheet' href='css/auth.css'>
    <script src='js/auth.js'></script>

</head>

<body class="login-page">
    <main class="login-container register-max-wrap">
        <div class="login-logo">
            <a href="CM_02_01.html">
                <img src="images/logo-withremit.png" alt="withremit">
            </a>
        </div>

        <div class="login-card register-card-wide">
            <h2 class="login-title">회원가입</h2>

            <section class="reg-section">
                <div class="reg-label">
                    <h3>개인회원 가입 서류</h3>
                </div>

                <div class="reg-dual-section">
                    <div class="reg-subsection">
                        <h4>내국인</h4>
                        <p class="subsection-desc">주민등록증 또는 운전면허증 중 한 가지를 양면 모두 준비해 주세요.</p>

                        <div class="reg-id-cards-vertical">
                            <div class="reg-id-card">
                                <div class="reg-svg-wrap">

                                    <img src="images/individual_ID_Card.svg" alt="주민등록증 양면" />
                                    <!-- <svg viewBox="0 0 80 52" fill="none">
                                        <rect width="80" height="52" rx="6" fill="#F1F5F9" />
                                        <rect x="8" y="8" width="24" height="28" rx="2" fill="#CBD5E1" />
                                        <circle cx="20" cy="18" r="5" fill="#E2E8F0" />
                                        <path d="M14 30C14 26 16 24 20 24C24 24 26 26 26 30" fill="#E2E8F0" />
                                        <rect x="36" y="10" width="32" height="4" rx="2" fill="#CBD5E1" />
                                        <rect x="36" y="18" width="28" height="4" rx="2" fill="#CBD5E1" />
                                        <rect x="36" y="26" width="36" height="3" rx="1.5" fill="#E2E8F0" />
                                        <rect x="36" y="32" width="30" height="3" rx="1.5" fill="#E2E8F0" />
                                        <rect x="8" y="42" width="20" height="3" rx="1.5" fill="#E2E8F0" />
                                    </svg> -->
                                </div>
                                <span>주민등록증 양면</span>
                            </div>

                            <div class="reg-id-card">
                                <div class="reg-svg-wrap">
                                    <img src="images/individual_Driver_Card.svg" alt="운전면허증 양면" />
                                </div>
                                <span>운전면허증 양면</span>
                            </div>
                        </div>
                    </div>

                    <div class="reg-subsection">
                        <h4>외국인</h4>
                        <p class="subsection-desc">여권과 외국인등록증 양면 모두 준비해 주세요.</p>

                        <div class="reg-id-cards-vertical">
                            <div class="reg-id-card">
                                <div class="reg-svg-wrap">
                                    <img src="images/individual_Passport_Card.svg" alt="여권">
                                </div>
                                <span>여권</span>
                            </div>

                            <div class="reg-id-card">
                                <div class="reg-svg-wrap">
                                    <img src="images/individual_Residence_Card.svg" alt="외국인등록증 양면">
                                </div>
                                <span>외국인등록증 양면</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="reg-submit">
                    <a href="CM_04_11.html" class="btn btn-primary size-lg">개인회원 가입하기</a>
                </div>
            </section>

            <div class="reg-hr"></div>

            <section class="reg-section">
                <div class="reg-label">
                    <h3>기업회원 가입 서류</h3>
                    <p>가입을 위해 아래 서류들을 <strong>모두</strong> 준비해 주세요.</p>
                </div>

                <div class="reg-id-grid id-grid-4">
                    <div class="reg-id-card">
                        <div class="reg-svg-wrap">
                            <img src="images/business_Registration.svg" alt="사업자등록증">
                        </div>
                        <span>사업자등록증</span>
                    </div>

                    <div class="reg-id-card">
                        <div class="reg-svg-wrap">
                            <img src="images/business_Company_Registry.svg" alt="등기부등본">
                        </div>
                        <span>등기부등본</span>
                    </div>

                    <div class="reg-id-card">
                        <div class="reg-svg-wrap">
                            <img src="images/business_Shareholder_List.svg" alt="주주명부">
                        </div>
                        <span>주주명부</span>
                    </div>

                    <div class="reg-id-card">
                        <div class="reg-svg-wrap">
                            <img src="images/business_Company_ID_Card.svg" alt="신청자 신분증 양면">
                        </div>
                        <span>신청자 신분증 양면</span>
                    </div>
                </div>

                <div class="reg-submit">
                    <a href="CM_04_21.html" class="btn btn-primary size-lg">기업회원 가입하기</a>
                </div>
            </section>

            <div class="reg-cancel-box">
                <button type="button" class="btn btn-secondary size-lg" onclick="history.back()">취소</button>
            </div>
        </div>
    </main>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
</body>

</html>
