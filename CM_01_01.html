<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WithRemit - Modal Guide</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: #f8fafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px var(--s5);
        }

        .guide-logo {
            height: 50px;
            margin-bottom: var(--s5);
        }

        .guide-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1B5E9E;
            margin-bottom: var(--s10);
        }

        .demo-section {
            margin-bottom: 50px;
            text-align: center;
            width: var(--full);
            max-width: 600px;
        }

        .section-name {
            font-size: 14px;
            font-weight: 700;
            color: #7A8E96;
            text-transform: uppercase;
            margin-bottom: var(--s5);
            letter-spacing: 1px;
        }

        .btn-flex {
            display: flex;
            gap: var(--s3);
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel='stylesheet' href='css/auth.css'>
    <script src='js/auth.js'></script>

</head>

<body>
    <img src="images/logo-withremit.png" alt="withremit" class="guide-logo">
    <h1 class="guide-title">Modal Guide</h1>

    <div class="demo-section">
        <div class="section-name">System Notifications</div>
        <div class="btn-flex">
            <button class="btn btn-success" onclick="openModal('successModal')">Success Modal</button>
            <button class="btn btn-warning" onclick="openModal('warningModal')">Warning Modal</button>
            <button class="btn btn-blue" onclick="openModal('confirmModal')">Confirm Modal</button>
        </div>
    </div>

    <div class="demo-section">
        <div class="section-name">Security Input</div>
        <div style="position: relative; width: 320px; margin: 0 auto;">
            <div class="input-box-group">
                <div class="password-wrap" style="width: var(--full);">
                    <input type="password" id="userPassword" class="login-input" placeholder="비밀번호 입력" readonly
                        onclick="toggleKeypad('userPassword')">
                    <button type="button" class="keypad-btn" tabindex="-1">
                        <img src="images/svg/icon_keypad.svg" alt="보안 키보드 아이콘" />
                    </button>
                    <div id="securityKeypad" class="security-keypad">
                        <div class="keypad-header">
                            <span>보안 키보드</span>
                            <button type="button" class="close-keypad" onclick="toggleKeypad()">&times;</button>
                        </div>
                        <div id="keypadContainer" class="keypad-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="images/svg/icon_success.svg" alt="성공 아이콘" class="upload-icon" />
                </div>
                <h3>회원가입 완료</h3>
                <p>회원가입 신청이 성공적으로 접수되었습니다.<br>이메일 인증을 완료해 주세요.</p>
                <button class="btn btn-warning full size-lg" style="background-color: #00A0DC;" onclick="closeModal('successModal')">확인</button>
            </div>
        </div>
    </div>

    <div id="warningModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="images/svg/icon_warning.svg" alt="경고 아이콘" class="upload-icon" />
                </div>
                <h3>송금 한도 초과</h3>
                <p>외환거래법령에 따라 건당 최대 <b>$5,000(USD)</b>까지 송금이 가능합니다. 금액을 다시 확인해 주세요.</p>
                <button class="btn btn-warning full size-lg" onclick="closeModal('warningModal')">확인</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="images/svg/icon_confirm.svg" alt="업로드 아이콘" class="upload-icon" />
                </div>

                <h3>진행하시겠습니까?</h3>
                <p>입력하신 정보로 송금 신청을 진행하시겠습니까?<br>진행 후에는 정보 수정이 어려울 수 있습니다.</p>
                <div class="modal-btn-group">
                    <button class="btn btn-secondary size-lg" onclick="closeModal('confirmModal')">취소</button>
                    <button class="btn btn-primary size-lg" onclick="closeModal('confirmModal')">확인</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
