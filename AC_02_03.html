                                    <thead>

                        </div>

                            <div class="db-table-responsive">
                                <table class="common-table history-mode account-mode">
                                    <colgroup>
                                        <col class="col-check">
                                        <col class="col-type">
                                        <col class="col-name">
                                        <col class="col-num">
                                        <col class="col-balance">
                                        <col class="col-status">
                                    </colgroup>
                                    <thead>
                                        <tr>
                                            <th class="center">선택</th>
                                            <th>계좌 종류</th>
                                            <th>계좌명</th>
                                            <th>계좌 번호</th>

                    <!-- Bank Group 3 -->

                        <div class="guide-section">

                        </div>
                        <div class="bank-table-card">
                            <div class="db-table-responsive">
                                <table class="common-table history-mode account-mode">
                                    <colgroup>
                                        <col class="col-check">
                                        <col class="col-type">
                                        <col class="col-name">
                                        <col class="col-num">

                                        <col class="col-status">
                                    </colgroup>
                                    <thead>

                                            <th>계좌명</th>
                                            <th>계좌 번호</th>

    <div id="contactContainer"></div>
    <div id="footerContainer"></div>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>
    <script>
        // Render tbody rows from bankAccountData using innerHTML
        function renderBankAccountRows() {
            const bankMap = {
                '산업': 'tbody-sanup',
                '케이뱅크': 'tbody-kbank',
                '카카오뱅크': 'tbody-kakao'
            };

            // Group accounts by bank
            const accountsByBank = {};
            window.bankAccountData.forEach(account => {
                if (!accountsByBank[account.bankName]) {
                    accountsByBank[account.bankName] = [];
                }
                accountsByBank[account.bankName].push(account);
            });

            // Populate tbody rows
            Object.entries(accountsByBank).forEach(([bankName, accounts]) => {
                const tbody = document.getElementById(bankMap[bankName]);
                if (!tbody) return;

                let html = '';
                accounts.forEach(account => {
                    const checkboxDisabled = account.disabled ? 'disabled' : '';
                    const customCheckStyle = account.disabled ? ' style="margin-right: 0; background-color: #f3f4f6; border-color: #e5e7eb; cursor: not-allowed;"' : '';

                    html += `
                        <tr class="${account.disabled ? 'disabled' : ''}">
                            <td class="center" data-label="선택">
                                <label class="check-label-group">
                                    <input type="checkbox" class="account-check" data-id="${account.id}" ${checkboxDisabled}>
                                    <span class="custom-check"${customCheckStyle}></span>
                                </label>
                            </td>
                            <td class="center" data-label="계좌 종류">${account.accountType}</td>
                            <td data-label="계좌명">${account.accountName}</td>
                            <td data-label="계좌 번호">${account.accountNumber}</td>
                            <td class="right col-balance" data-label="현재 잔액">${account.balance}</td>
                            <td class="center" data-label="등록 구분">
                                <div class="remit-card-col remit-card-status-wrapper">
                                    <span class="remit-status status-${account.status}">
                                        ${getStatusSVG(account.status)}
                                        ${account.statusText}
                                    </span>
                                </div>
                            </td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;
            });

            // Initialize interactions
            initializeCheckboxes();
        }

        function initializeCheckboxes() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.account-check:not([disabled])');
            const btnRegister = document.getElementById('btnRegister');

            updateTotalCount();

            // Select all functionality
            selectAll.addEventListener('change', () => {
                checkboxes.forEach(cb => {
                    cb.checked = selectAll.checked;
                });
                updateSelectionState();
            });

            // Individual checkbox changes
            checkboxes.forEach(cb => {
                cb.addEventListener('change', () => {
                    updateSelectionState();
                });
            });

            function updateSelectionState() {
                const checkedCount = document.querySelectorAll('.account-check:checked').length;
                const enabledCount = checkboxes.length;

                selectAll.checked = (checkedCount > 0 && checkedCount === enabledCount);
                btnRegister.textContent = `${checkedCount}개 계좌 등록`;

                if (checkedCount === 0) {
                    btnRegister.disabled = true;
                    btnRegister.style.opacity = '0.5';
                    btnRegister.style.cursor = 'not-allowed';
                } else {
                    btnRegister.disabled = false;
                    btnRegister.style.opacity = '1';
                    btnRegister.style.cursor = 'pointer';
                }
            }

            // Row click to toggle checkbox
            const tableRows = document.querySelectorAll('.common-table tbody tr');
            tableRows.forEach(row => {
                row.addEventListener('click', (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.closest('label')) {
                        return;
                    }
                    const checkbox = row.querySelector('.account-check');
                    if (checkbox && !checkbox.disabled) {
                        checkbox.checked = !checkbox.checked;
                        checkbox.dispatchEvent(new Event('change'));
                    }
                });
            });
        }

        function updateTotalCount() {
            const allAccounts = document.querySelectorAll('.account-check').length;
            document.getElementById('totalCountDisplay').textContent = allAccounts;
        }

        function registerSelected() {
            const checkedCount = document.querySelectorAll('.account-check:checked').length;
            if (checkedCount === 0) {
                return;
            }
            location.href = 'AC_02_04.html';
        }

        // Initialize on DOMContentLoaded
        document.addEventListener('DOMContentLoaded', () => {
            renderBankAccountRows();
        });
    </script>
</body>

</html>
