<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="withremit 아이디/비밀번호 찾기">
    <title>아이디/비밀번호 찾기 - WithMoney</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel='stylesheet' href='css/auth.css'>
    <script src='js/auth.js'></script>


</head>

<body class="login-page">

    <!-- Login Container -->
    <main class="login-container">
        <div class="login-logo">
            <a href="CM_02_01.html"><img src="images/logo-withremit.png" alt="withremit"></a>
        </div>

        <div class="login-card">
            <h2 class="login-title">아이디/비밀번호 찾기</h2>

            <!-- <div class="find-tabs">
                <button type="button" class="find-tab-btn active" onclick="switchTab('findId')">아이디 찾기</button>
                <button type="button" class="find-tab-btn" onclick="switchTab('findPw')">비밀번호 찾기</button>
            </div> -->

            <div class="common-tabs">
                <button type="button" class="common-tab active" data-tab="findId" onclick="resetForm()">아이디 찾기</button>
                <button type="button" class="common-tab" data-tab="findPw" onclick="resetForm()">비밀번호 찾기</button>
            </div>

            <!-- 아이디 찾기 폼 -->
            <div id="tab-findId" class="tab-content active">
                <form class="login-form">
                    <div class="field-item field-group">
                        <label class="field-label" for="userNameId">영문 이름</label>
                        <div class="input-box-group" id="userNameIdBox">
                            <input type="text" id="userNameId" class="login-input" placeholder="영문 이름을 입력하세요">
                        </div>
                        <div class="field-error" id="userNameIdError"></div>
                    </div>

                    <div class="field-item field-group">
                        <label class="field-label" for="userEmailId">이메일</label>
                        <div class="input-box-group" id="userEmailIdBox">
                            <input type="email" id="userEmailId" class="login-input" placeholder="이메일을 입력하세요">
                        </div>
                        <div class="field-error" id="userEmailIdError"></div>
                    </div>
                    <div class="btn-align wrap">
                        <button type="button" class="btn btn-primary size-lg" onclick="validateFindId()">확인</button>
                        <a href="CM_03_01.html" class="btn btn-secondary size-lg">취소</a>
                    </div>
                    <div class="register-wrap">
                        <a href="CM_03_01.html" class="register-item">로그인 하러 가기</a>
                    </div>
                </form>
            </div>

            <!-- 비밀번호 찾기 폼 -->
            <div id="tab-findPw" class="tab-content">
                <form class="login-form">
                    <div class="field-item field-group">
                        <label class="field-label" for="userIdPw">아이디</label>
                        <div class="input-box-group" id="userIdPwBox">
                            <input type="text" id="userIdPw" class="login-input" placeholder="아이디를 입력하세요">
                        </div>
                        <div class="field-error" id="userIdPwError"></div>
                    </div>

                    <div class="field-item field-group">
                        <label class="field-label" for="userEmailPw">이메일</label>
                        <div class="input-box-group" id="userEmailPwBox">
                            <input type="email" id="userEmailPw" class="login-input" placeholder="이메일을 입력하세요">
                        </div>
                        <div class="field-error" id="userEmailPwError"></div>
                    </div>

                    <div class="btn-align wrap">
                        <button type="button" class="btn btn-primary size-lg" onclick="validateFindPw()">확인</button>
                        <a href="CM_03_01.html" class="btn btn-secondary size-lg">취소</a>
                    </div>
                    <div class="register-wrap">
                        <a href="CM_03_01.html" class="register-item">로그인 하러 가기</a>
                    </div>
                </form>
            </div>
        </div>

        </div>

        <div class="login-footer-wrap" id="loginFooterContainer"></div>
    </main>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="js/includes.js"></script>
    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
    <script>
        function switchTab(tabId) {
            clearAllErrors();
        }
        function resetForm() {
            document.querySelectorAll('.login-form input').forEach(input => input.value = '');
            clearAllErrors();
        }

        function validateFindId() {
            clearAllErrors();

            const requiredFields = [
                { id: 'userNameId', message: 'error.nameEnRequired' },
                { id: 'userEmailId', message: 'error.emailRequired' }
            ];

            if (!validateRequiredFields(requiredFields)) return;

            alert('아이디 찾기 기능은 준비중입니다.');
        }

        function validateFindPw() {
            clearAllErrors();

            const requiredFields = [
                { id: 'userIdPw', message: 'error.userIdRequired' },
                { id: 'userEmailPw', message: 'error.emailRequired' }
            ];

            if (!validateRequiredFields(requiredFields)) return;

            alert('비밀번호 찾기 기능은 준비중입니다.');
        }
    </script>
</body>

</html>
