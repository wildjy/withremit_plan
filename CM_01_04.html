<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>withremit - 비밀번호 확인</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/guide.css">
    <link rel='stylesheet' href='css/auth.css'>

    <link rel="icon" type="image/png" href="images/favicon.png">

    <script src='js/auth.js'></script>

</head>

<body class="db-body">
    <div id="headerContainer"></div>

    <main class="db-main-container container">
        <div class="db-layout-flex">
            <div id="sidebarContainer"></div>

            <div class="db-content">
                <!-- db-page-header Removed -->

                <div class="db-content-card">
                    <div class="password-confirm-container">
                        <h2 class="password-confirm-title">비밀번호 확인</h2>
                        <p class="password-confirm-desc">정보 보호를 위해 비밀번호 확인이 필요합니다.</p>

                        <div class="field-group">
                            <label class="field-label">비밀번호</label>
                            <div class="input-box-group" id="passwordCheckBox">
                                <div class="password-wrap">
                                    <input type="text" id="passwordCheck" class="login-input" placeholder="비밀번호를 입력하세요" readonly onclick="toggleKeypad('passwordCheck')">
                                    <button type="button" class="keypad-btn" tabindex="-1" onclick="toggleKeypad('passwordCheck')">
                                        <img src="images/svg/icon_keypad.svg" alt="보안 키보드 아이콘" />
                                    </button>
                                </div>
                            </div>
                            <div class="error-msg" id="passwordCheckError"></div>
                        </div>
                        <div class="btn-align wrap">
                            <button type="button" class="btn btn-primary size-lg disabled" id="confirmBtn">확인</button>
                            <button type="button" class="btn btn-secondary size-lg" onclick="history.back()">취소</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="contactContainer"></div>
    <div id="footerContainer"></div>

    <!-- Security Keypad Container -->
    <div id="securityKeypad" class="security-keypad">
        <div class="keypad-header">
            <span>보안 키보드</span>
            <button type="button" class="close-keypad" onclick="toggleKeypad(null)">&times;</button>
        </div>
        <div id="keypadContainer" class="keypad-grid"></div>
    </div>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const redirectTarget = urlParams.get('redirect');

            if (redirectTarget === 'mypage') {
                const confirmBtn = document.getElementById('confirmBtn');
                if (confirmBtn) {
                    confirmBtn.addEventListener('click', (e) => {
                        window.location.href = 'UT_01_01.html';
                    });
                }
            }
        });
    </script>
</body>

</html>
