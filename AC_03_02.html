<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>withremit - 자주 쓰는 계좌</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel='stylesheet' href='css/auth.css'>
    <script src='js/auth.js'></script>

</head>

<body class="db-body">
    <div id="headerContainer"></div>

    <main class="db-main-container container">
        <div class="db-layout-flex">
            <div id="sidebarContainer"></div>

            <div class="db-content">
                <div class="db-page-header">
                    <h1 class="db-page-title">자주 쓰는 계좌 등록</h1>
                </div>

                <div class="db-content-card">

                    <!-- 수취 정보 입력 -->
                    <div class="remit-form-section">
                        <div class="form-sec-head-wrap">
                            <h2 class="form-sec-head">계좌 정보 입력</h2>
                            <div class="head-buttons">
                                <button type="button" class="account-btn btn btn-secondary size-sm" data-account-type="recent">최근 입금 계좌</button>
                            </div>
                        </div>

                        <div class="form-sec">
                            <!-- 국가 (Full Width) -->
                            <div class="field-item" style="margin-bottom: 24px;">
                                <label class="field-label">국가</label>
                                <select class="login-input select-styled" id="remitCountry"> <!-- remitCountry-->
                                    <option value="" disabled selected>선택</option>
                                    <option value="JP">일본 (JPY)</option>
                                    <option value="PH">필리핀 (PHP)</option>
                                    <option value="CN">중국 (CNY)</option>
                                    <option value="NP">네팔 (NPR)</option>
                                    <option value="AU">호주 (AUD)</option>
                                    <option value="HK">홍콩 (HKD)</option>
                                    <option value="MN">몽골 (MNT)</option>
                                    <option value="VN">베트남 (VND)</option>
                                    <option value="LK">스리랑카 (LKR)</option>
                                    <option value="BD">방글라데시 (BDT)</option>
                                </select>
                                <span class="field-error" id="remitCountryError"></span>
                            </div>

                            <!-- 2 Columns Row 1 -->
                            <div class="form-row-2">
                                <!-- 수취인명 -->
                                <div class="form-row-2 no-mb">
                                    <div class="field-item">
                                        <label class="field-label">
                                            <span data-i18n="join.request.firstNameEn">이름 (영문)</span>
                                        </label>
                                        <input type="text" placeholder="영문으로 입력하세요" class="login-input" id="firstNameEn">
                                        <span class="field-error" id="firstNameEnError"></span>
                                    </div>
                                    <div class="field-item">
                                        <label class="field-label">
                                            <span data-i18n="join.request.lastNameEn">성 (영문)</span>
                                        </label>
                                        <input type="text" placeholder="영문으로 입력하세요" class="login-input" id="lastNameEn">
                                        <span class="field-error" id="lastNameEnError"></span>
                                    </div>
                                </div>
                                <!-- 은행명 -->

                                <div class="form-row-2 no-mb" id="NameKanaSection" style="display: none;">
                                    <div class="field-item">
                                        <label class="field-label">수취인 이름 (카나명)</label>
                                        <input type="text" placeholder="카타카나로 입력하세요 (예: ヤマダ)" class="login-input"
                                            id="beneficiaryNameKana">
                                        <span class="field-error" id="beneficiaryNameKanaError"></span>
                                    </div>
                                    <div class="field-item">
                                        <label class="field-label">수취인 성 (카나명)</label>
                                        <input type="text" placeholder="카타카나로 입력하세요 (예: ヤマダ)" class="login-input"
                                            id="beneficiaryLastNameKana">
                                        <span class="field-error" id="beneficiaryLastNameKanaError"></span>
                                    </div>
                                </div>

                                <div class="form-row no-mb" id="BsbSection">
                                    <div class="field-item" id="BsbField" style="display: none;">
                                        <label class="field-label no-uppercase">BSB<span class="hide-pc">(Bank State Branch)</span> 번호</label>
                                        <input type="text" placeholder="BSB 번호를 입력하세요" class="login-input" id="bsbNumber">
                                        <span class="field-error" id="bsbNumberError"></span>
                                    </div>
                                    <div class="field-item">
                                        <label class="field-label">은행명</label>
                                        <select class="login-input select-styled" id="bankSelect">
                                            <option value="" disabled selected>선택</option>
                                            <option value="Mizuho Bank">Mizuho Bank</option>
                                            <option value="BDO">BDO</option>
                                            <option value="ICBC">ICBC</option>
                                            <option value="Nabil Bank">Nabil Bank</option>
                                            <option value="Commonwealth">Commonwealth</option>
                                            <option value="HSBC">HSBC</option>
                                            <option value="Khan Bank">Khan Bank</option>
                                            <option value="Vietcombank">Vietcombank</option>
                                            <option value="BOC">BOC</option>
                                        </select>
                                        <span class="field-error" id="bankSelectError"></span>
                                    </div>
                                </div>
                            </div>

                            <!-- 2 Columns Row 2 -->
                            <div class="form-row-2">
                                <!-- 계좌 번호 -->
                                <div class="field-item">
                                    <label class="field-label">계좌 번호</label>
                                    <input
                                        type="text"
                                        class="login-input "
                                        id="accountNumber"
                                        inputmode="numeric"
                                        pattern="[0-9]*"
                                        oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                                        placeholder="계좌 번호 입력 (- 없이)"
                                    />
                                    <span class="field-error" id="accountNumberError"></span>
                                </div>
                                <!-- 송금 목적 -->
                                <div class="field-item">
                                    <label class="field-label">송금 목적</label>
                                    <select class="login-input select-styled" id="remitPurpose">
                                        <option value="" disabled selected>선택</option>
                                        <option value="family">가족 송금</option>
                                        <option value="education">교육비</option>
                                        <option value="living">생활비</option>
                                        <option value="medical">의료비</option>
                                        <option value="business">사업</option>
                                        <option value="investment">투자</option>
                                        <option value="saving">저축</option>
                                        <option value="other">기타</option>
                                    </select>
                                    <span class="field-error" id="remitPurposeError"></span>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- 하단 버튼 -->
                    <div class="btn-align">
                        <button type="button" class="btn btn-secondary size-lg" onclick="location.href='AC_03_01.html'">취소</button>
                        <button type="button" class="btn btn-primary size-lg" onclick="confirmRegister()">등록</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="contactContainer"></div>
    <div id="footerContainer"></div>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="#00A0DC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11"></polyline>
                    </svg>
                </div>
                <h3>등록 완료</h3>
                <p>자주 쓰는 계좌가 등록되었습니다.</p>
                <button class="btn btn-primary full size-lg" onclick="closeSuccessModal()">확인</button>
            </div>
        </div>
    </div>

    <!-- 계좌 선택 모달 -->
    <div id="accountSelectionModal" class="modal-overlay">
        <div class="modal-content modal-layout lg">
            <div class="modal-inner">
                <div class="modal-header">
                    <h2 class="modal-title" id="accountModalTitle">최근 입금 계좌</h2>
                    <button class="modal-close" onclick="closeModal('accountSelectionModal')">&times;</button>
                </div>

                <!-- 테이블 영역 (스크롤 가능) -->
                <div class=" account-table-container"><!-- db-table-container -->
                    <table class="common-table hover-table" id="accountTable">
                        <colgroup>
                            <col class="account-col-num">
                            <col class="account-col-country">
                            <col class="account-col-name">
                            <col class="account-col-name">
                            <col class="account-col-bank">
                            <col class="account-col-account">
                            <col class="account-col-account">
                            <col class="account-col-account">
                        </colgroup>
                        <thead class="account-table-sticky-header">
                            <tr>
                                <th>번호</th>
                                <th>국가</th>
                                <th>수취인명</th>
                                <th>수취인명(카나)</th>
                                <th>은행명</th>
                                <th>계좌 번호</th>
                                <th>BSB 번호</th>
                                <th>송금목적</th>
                            </tr>
                        </thead>
                        <tbody id="deleteTableBody">
                            <!-- 자바스크립트로 데이터 로드 -->
                        </tbody>
                    </table>
                </div>

                <!-- 모바일 카드 레이아웃 (768px 이하) -->
                <div class="account-card-list" id="accountCardList">
                    <!-- JavaScript로 카드 렌더링 -->
                </div>

                <div class="modal-footer">
                        <button class="btn btn-primary full size-lg" onclick="closeModal('accountSelectionModal')">확인</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>
    <script src="data/remit-common-data.js"></script>
    <script src="js/remit-common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.initRemitAccountSelection === 'function') {
                window.initRemitAccountSelection();
            }
        });

        document.getElementById('accountSelectionModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeModal('accountSelectionModal');
            }
        });

        // 모든 에러 초기화
        function clearAllErrors() {
            document.querySelectorAll('.input-box-group.error').forEach(el => el.classList.remove('error'));
            document.querySelectorAll('.select-styled.error').forEach(el => el.classList.remove('error'));
            document.querySelectorAll('input.error').forEach(el => el.classList.remove('error'));
            document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
        }

        function confirmRegister() {
            // Validation
            clearAllErrors();

            let hasError = false;
            let firstErrorElement = null;

            const requiredFields = [
                { id: 'remitCountry', message: '국가를 선택해 주세요.' },
                { id: 'firstNameEn', message: '이름을 입력해 주세요.' },
                { id: 'lastNameEn', message: '성을 입력해 주세요.' },
                { id: 'beneficiaryNameKana', message: '수취인 이름 (카나명)을 입력해 주세요.' },
                { id: 'beneficiaryLastNameKana', message: '수취인 성 (카나명)을 입력해 주세요.' },
                { id: 'bsbNumber', message: 'BSB 번호를 입력해 주세요.' },
                { id: 'bankSelect', message: '은행을 선택해 주세요.' },
                { id: 'accountNumber', message: '계좌 번호를 입력해 주세요.' },
                { id: 'remitPurpose', message: '송금 목적을 선택해 주세요.' }
            ];

            for (const field of requiredFields) {
                const element = document.getElementById(field.id);
                if (!element || !element.value || element.value.trim() === '') {
                    showFieldError(field.id, field.message);
                    hasError = true;
                    if (!firstErrorElement) {
                        firstErrorElement = element;
                    }
                } else {
                    clearFieldError(field.id);
                }
            }

            if (hasError) {
                if (firstErrorElement) {
                    firstErrorElement.focus();
                }
                return;
            }

            openModal('successModal');
        }

        function closeSuccessModal() {
            closeModal('successModal');
            location.href = 'AC_03_01.html';
        }
    </script>
</body>

</html>
