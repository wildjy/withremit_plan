<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>withremit - 자주 쓰는 계좌</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel='stylesheet' href='css/auth.css'>
    <script src='js/auth.js'></script>

</head>

<body class="db-body">
    <div id="headerContainer"></div>

    <main class="db-main-container container">
        <div class="db-layout-flex">
            <div id="sidebarContainer"></div>

            <div class="db-content">
                <div class="db-page-header">
                    <h1 class="db-page-title">자주 쓰는 계좌</h1>
                    <div class="db-page-actions">
                        <button type="button" class="btn btn-primary"
                            onclick="location.href='AC_03_02.html'">등록</button>
                    </div>
                </div>

                <div class="db-content-card">
                    <!-- Total Count -->
                    <div class="db-table-info">
                        <span class="db-total-count">총 <strong id="totalCount">9</strong>건</span>
                    </div>

                    <!-- Table Container -->
                    <div class="db-table-responsive">
                        <table class="common-table history-mode number-mode">
                            <colgroup>
                                <col class="col-num">
                                <col>
                                <col>
                                <col>
                                <col>
                                <col>
                                <col class="col-delete">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th class="th-num">번호</th>
                                    <th>국가</th>
                                    <th>수취인 이름</th>
                                    <th>수취인 성</th>
                                    <th>은행명</th>
                                    <th>계좌 번호</th>
                                    <th>송금 목적</th>
                                    <th>삭제</th>
                                </tr>
                            </thead>
                            <tbody id="deleteTableBody"></tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div class="empty-box" id="emptyState">
                        <p class="empty-title">자주 쓰는 계좌가 없습니다.</p>
                        <p>등록된 자주 쓰는 계좌가 없으면 여기에 표시됩니다.</p>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </main>

    <div id="contactContainer"></div>
    <div id="footerContainer"></div>

    <!-- Delete Confirm Modal -->
    <div id="deleteConfirmModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-inner">
                <div class="modal-icon">
                    <img src="images/icon_confirm.png" alt="업로드 아이콘" class="upload-icon" />
                </div>
                <h3>계좌 삭제</h3>
                <p>정말 삭제하시겠습니까?</p>
                <div class="modal-btn-group">
                    <button class="btn btn-secondary size-lg" onclick="closeDeleteModal()">취소</button>
                    <button class="btn btn-confirm size-lg" onclick="confirmDelete()">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="data/main-data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>

</html>
