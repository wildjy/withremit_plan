<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>withremit - 1:1 문의</title>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css?v=1.4">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel='stylesheet' href='css/auth.css'>
    <script src='js/auth.js'></script>
</head>

<body class="db-body">
    <div id="headerContainer"></div>

    <main class="db-main-container container">
        <div class="db-layout-flex">
            <div id="sidebarContainer"></div>

            <div class="db-content">
                <div class="db-page-header">
                    <h1 class="db-page-title">1:1 문의</h1>
                </div>

                <div class="db-content-card">

                    <!-- 문의 내용 입력 -->
                    <div class="remit-form-section">
                        <div class="form-sec">
                            <!-- 제목 -->
                            <div class="field-item mb-24">
                                <label class="field-label">제목 <span class="badge-required">필수</span></label>
                                <input type="text" placeholder="제목을 입력하세요" class="login-input" id="inquiryTitle">
                                <span class="field-error" id="inquiryTitleError"></span>
                            </div>

                            <div class="form-row-2">
                                <div class="form-row-2 no-mb">
                                    <div class="field-item">
                                        <label class="field-label">
                                            <span data-i18n="join.request.email">이메일 주소</span>
                                            <span class="badge-required" data-i18n="join.required">필수</span>
                                        </label>
                                        <input
                                            type="text"
                                            id="emailLocal"
                                            class="login-input"
                                            inputmode="email"
                                            autocomplete="email"
                                            placeholder="예: user"
                                            aria-label="이메일 아이디"
                                            data-i18n="join.emailLocalPlaceholder"
                                        />
                                    </div>
                                    <div class="field-item align-end">
                                        <input
                                            type="text"
                                            id="emailDomain"
                                            class="login-input"
                                            inputmode="url"
                                            placeholder="직접 입력"
                                            aria-label="이메일 도메인 직접 입력"
                                            data-i18n="join.emailDomainPlaceholder"
                                        />
                                    </div>
                                </div>
                                <div class="form-row no-mb">
                                    <div class="field-item align-end">
                                        <div class="field-flex full-width">
                                            <select id="domainMode" class="login-input select-styled" aria-label="도메인 입력 방식">
                                                <option value="direct" selected data-i18n="join.emailDomainPlaceholder">직접 입력</option>
                                                <option value="gmail.com">gmail.com</option>
                                                <option value="naver.com">naver.com</option>
                                                <option value="daum.net">daum.net</option>
                                                <option value="hotmail.com">hotmail.com</option>
                                                <option value="nate.com">nate.com</option>
                                            </select>
                                            <button
                                                type="button"
                                                class="btn-sub-action"
                                                id="btnCheckEmail"
                                                onclick="openModal('emailDupOkModal') // emailDupOkModal & emailDupUsedModal"
                                                data-i18n="join.checkEmail"
                                            >
                                                이메일 중복
                                            </button>

                                            <input type="hidden" id="emailFull" name="email" value="" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="form-row-3">
                                <div class="field-item">
                                    <label class="field-label">이름 <span class="badge-required">필수</span></label>
                                    <input type="text" placeholder="이름을 입력하세요" class="login-input" id="inquiryName">
                                    <span class="field-error" id="inquiryNameError"></span>
                                </div>

                                <div class="field-item">
                                    <label class="field-label">성별</label>
                                    <div class="field-flex h-52">
                                        <label class="radio-wrap">
                                            <input type="radio" name="g" id="genderMale">
                                            <span class="custom-radio"></span>
                                            <span>남성</span>
                                        </label>
                                        <label class="radio-wrap">
                                            <input type="radio" name="g" id="genderFemale">
                                            <span class="custom-radio"></span>
                                            <span>여성</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="field-item">
                                    <label class="field-label">직업</label>
                                    <select class="login-input select-styled" id="inquiryJob">
                                        <option value="" selected>선택</option>
                                        <option value="office">사무직</option>
                                        <option value="professional">전문직</option>
                                        <option value="business">자영업</option>
                                        <option value="student">학생</option>
                                        <option value="housewife">전업주부</option>
                                        <option value="other">기타</option>
                                    </select>
                                </div>
                            </div>

                            <!-- 성별 & 직업 -->
                            <div class="form-row-2">
                            </div>

                            <!-- 내용 -->
                            <div class="field-item">
                                <label class="field-label">내용</label>
                                <textarea placeholder="내용을 입력하세요" class="login-input textarea-inquiry"
                                    id="inquiryContent" rows="10"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 하단 버튼 -->
                    <div class="remit-action-btns">
                        <button type="button" class="btn btn-primary" onclick="openConfirmModal()">문의하기</button>
                    </div>

                    <!-- 문의 내역 확인 박스 -->
                    <div class="inquiry-bottom-info">
                        <div class="inquiry-info-text">
                            <strong>문의하신 내역이 있으신가요?</strong>
                            등록하신 1:1 문의 내역과 답변 상황을 확인하실 수 있습니다.
                        </div>
                        <button type="button" class="btn btn-outline" onclick="location.href='CS_03_02.html'">문의 내역
                            확인</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="contactContainer"></div>
    <div id="footerContainer"></div>

    <!-- 이메일 중복 확인 모달 -->
    <div id="emailDupOkModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00A0DC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11"></polyline>
                </svg>
            </div>
            <h3 data-i18n="modal.emailDup.title">이메일 중복 확인</h3>
            <p data-i18n="modal.emailDup.ok">사용 가능한 이메일입니다.</p>
            <button class="modal-btn-success" onclick="closeModal('emailDupOkModal')" data-i18n="button.confirm">확인</button>
        </div>
    </div>

    <!-- 이메일 중복 확인 실패 모달 -->
    <div id="emailDupUsedModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                    </path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <h3 data-i18n="modal.emailDup.title">이메일 중복 확인</h3>
            <p data-i18n="modal.emailDup.fail">이미 사용 중인 이메일입니다.</p>
            <button class="modal-btn-warning" onclick="closeModal('emailDupUsedModal')" data-i18n="button.confirm">확인</button>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="#1B5E9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <h3>문의하시겠습니까?</h3>
            <p>문의에 대한 답변을 이메일로 받아보실 수 있습니다.</p>
            <div class="modal-btn-group">
                <button class="btn-cancel" onclick="closeModal('confirmModal')">취소</button>
                <button class="btn-confirm-action" onclick="submitInquiry()">확인</button>
            </div>
        </div>
    </div>

    <script src="js/language.js"></script><!-- 언어변경 스크립트 -->
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>
    <script>
        // Check for guest mode and hide inquiry history link
        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('guest') === 'true') {
                const bottomInfo = document.querySelector('.inquiry-bottom-info');
                if (bottomInfo) {
                    bottomInfo.style.display = 'none';
                }
            }

            // 이메일 입력 방식 이벤트 핸들러
            emailDomainEventHandler();
        });

        function openConfirmModal() {
            // Validation
            clearAllErrors();
            let hasError = false;

            const fields = [
                { id: 'inquiryTitle', message: '제목을 입력해 주세요.' },
                { id: 'inquiryEmail', message: '이메일을 입력해 주세요.' },
                { id: 'inquiryName', message: '이름을 입력해 주세요.' }
            ];

            fields.forEach(field => {
                const el = document.getElementById(field.id);
                if (!el.value.trim()) {
                    showFieldError(field.id, field.message);
                    hasError = true;
                }
            });

            if (hasError) return;

            document.getElementById('confirmModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function submitInquiry() {
            location.href = 'CS_03_02.html';
        }

        // function showFieldError(elementId, message) {
        //     const element = document.getElementById(elementId);
        //     if (!element) return;
        //     element.classList.add('error');
        //     const errorSpan = document.getElementById(`${elementId}Error`);
        //     if (errorSpan) errorSpan.textContent = message;
        // }

        function clearAllErrors() {
            document.querySelectorAll('.login-input.error').forEach(el => el.classList.remove('error'));
            document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
        }

        // Close modal when clicking overlay
        document.getElementById('confirmModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeModal('confirmModal');
            }
        });
    </script>
</body>

</html>
